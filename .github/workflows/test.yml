name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -v -count=1 ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: psql
      - uses: actions/checkout@v4
        with:
          repository: portablesql/psql-test
          path: psql-test
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Setup workspace
        run: go work init ./psql ./psql-test
      - name: Install gocovmerge
        run: go install github.com/wadey/gocovmerge@latest
      - name: Run unit tests with coverage
        working-directory: psql
        run: go test -coverprofile=cover-unit.out -covermode=atomic -coverpkg=github.com/portablesql/psql/... ./...
      - name: Run integration tests with coverage
        working-directory: psql-test
        run: go test -coverprofile=cover-integ.out -covermode=atomic -coverpkg=github.com/portablesql/psql/... ./...
      - name: Merge coverage profiles
        run: gocovmerge psql/cover-unit.out psql-test/cover-integ.out > coverage.out
      - name: Send to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
