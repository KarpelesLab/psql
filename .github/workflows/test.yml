name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test -v -count=1 ./...

  coverage:
    name: Coverage (SQLite integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: psql
      - uses: actions/checkout@v4
        with:
          repository: portablesql/psql-test
          path: psql-test
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Setup go.work to use local psql
        working-directory: .
        run: |
          go work init ./psql ./psql-test
      - name: Run integration tests with coverage
        working-directory: psql-test
        run: |
          go test -coverprofile=coverage.out -covermode=atomic -coverpkg=github.com/portablesql/psql/... ./...
      - name: Send to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: psql-test/coverage.out
          format: golang
