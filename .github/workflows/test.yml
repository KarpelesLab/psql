name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-cockroach:
    name: Test (CockroachDB, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Start CockroachDB
        run: |
          docker run -d --name cockroach -p 26257:26257 -p 8080:8080 cockroachdb/cockroach:latest start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec cockroach cockroach sql --insecure -e "SELECT 1" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          docker exec cockroach cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS testdb"

      - name: Get dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        env:
          PSQL_TEST_DSN: "postgresql://root@localhost:26257/testdb?sslmode=disable"
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Coveralls
        if: matrix.go-version == '1.26'
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
          flag-name: cockroach
          parallel: true

  test-postgres:
    name: Test (PostgreSQL, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Get dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        env:
          PSQL_TEST_DSN: "postgresql://testuser:testpass@localhost:5432/testdb?sslmode=disable"
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Coveralls
        if: matrix.go-version == '1.26'
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
          flag-name: postgres
          parallel: true

  test-mysql:
    name: Test (MySQL, Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25', '1.26']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Get dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        env:
          PSQL_TEST_DSN: "root:testpass@tcp(localhost:3306)/testdb"
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Coveralls
        if: matrix.go-version == '1.26'
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.out
          format: golang
          flag-name: mysql
          parallel: true

  coverage-finish:
    name: Finish Coveralls
    needs: [test-cockroach, test-postgres, test-mysql]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
